<!--
  Ethiqia: Email de confirmacion de cuenta

  Copiar este HTML en Supabase Dashboard:
  Authentication > Email Templates > Confirm signup

  Subject: Confirma tu cuenta en Etiquia 🌱
-->

<div style="max-width:480px;margin:0 auto;padding:40px 24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:#0a0a0a;color:#ffffff;">

  <!-- Logo -->
  <div style="text-align:center;margin-bottom:32px;">
    <div style="display:inline-block;width:48px;height:48px;background-color:rgba(16,185,129,0.15);border:2px solid #10b981;border-radius:12px;line-height:48px;font-size:24px;font-weight:700;color:#10b981;">
      E
    </div>
    <div style="margin-top:8px;font-size:18px;font-weight:700;color:#ffffff;">ethiqia</div>
  </div>

  <!-- Contenido -->
  <div style="text-align:center;">
    <h1 style="font-size:22px;font-weight:700;color:#ffffff;margin:0 0 12px;">Bienvenido a Etiquia</h1>
    <p style="font-size:14px;color:#a3a3a3;line-height:1.6;margin:0 0 24px;">
      Pulsa el boton para confirmar tu email y empezar a construir tu reputacion etica.
    </p>

    <!-- Boton -->
    <a href="{{ .ConfirmationURL }}"
       style="display:inline-block;background-color:#10b981;color:#000000;font-size:14px;font-weight:600;text-decoration:none;padding:12px 32px;border-radius:9999px;">
      Confirmar mi cuenta
    </a>

    <p style="font-size:12px;color:#525252;margin-top:24px;line-height:1.5;">
      Si no creaste esta cuenta, ignora este email.
    </p>
  </div>

  <!-- Footer -->
  <div style="text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid #262626;">
    <p style="font-size:11px;color:#404040;margin:0;">
      etiquia.com · La red social etica
    </p>
  </div>
</div>
